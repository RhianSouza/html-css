<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando o uso de um iframe</title>
</head>
<style>
    iframe {
        width: 500px;
        height: 500px;
        border: 3px black dashed;
    }
</style>
<body>
    <p>
        Acessando o uso do

        <iframe src="https://www.cursoemvideo.com" frameborder="0" scolling="auto">
            <a href="https://www.cursoemvideo.com" target="_blank">Curso em Video</a>
        </iframe>
        Para aprender a progamar.
    </p>
    <p>
        O repositório do Guanabara
        <iframe src="https://gustavoguanabara.github.io" frameborder="0">no <a href="https://gustavoguanabara.github.io" target="_blank"></a>Github</iframe>

        também é legal!!
    </p>
</body>

</html>
